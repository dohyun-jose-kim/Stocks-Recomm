# 수집 대상 마켓 화이트리스트
# 처음에는 좁게 시작 — 운영하면서 늘림

kalshi:
  # 시리즈 단위로 필터. status=open인 마켓만 수집.
  # 시리즈 코드는 시간이 지나면 바뀔 수 있어 운영 중 확인 필요.
  series:
    - KXFED       # FOMC 금리 결정
    # 다음 후보 (확인 후 추가): KXCPI, KXJOBS, KXGDP, KXRECESSION

polymarket:
  # 카테고리/태그가 일관되지 않아, slug 키워드 + volume 기준으로 필터.
  # slug 또는 title에 아래 키워드 중 하나라도 포함되어야 통과.
  slug_keywords:
    - fed
    - fomc
    - rate
    - cpi
    - recession
    - inflation
  # 최소 누적 거래량 (USD). 너무 한산한 마켓 제외.
  # Polymarket은 마켓별 거래량 편차 큼. 일단 낮게 시작.
  min_volume: 1000
  # active=true && closed=false 둘 다 필수
